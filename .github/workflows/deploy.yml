name: Auto Update Micro System

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Engine Script
        env:
          BYBIT_API_KEY: ${{ secrets.BYBIT_API_KEY }}
          BYBIT_SECRET_KEY: ${{ secrets.BYBIT_SECRET_KEY }}
        run: python build_system.py

      - name: Commit and Push Updates
        run: |
          git config --global user.name "MicroBot"
          git config --global user.email "bot@system.internal"
          git add index.html
          git diff --quiet && git diff --staged --quiet || (git commit -m "System auto-update" && git push)
