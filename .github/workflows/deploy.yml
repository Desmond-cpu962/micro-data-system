name: Auto Update Micro System

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: pip install requests

    - name: Run Engine Script
      run: python build_system.py

    - name: Commit and Push Updates
      run: |
        git config --global user.name "MicroBot"
        git config --global user.email "bot@system.internal"
        git add index.html
        git diff-index --quiet HEAD || git commit -m "System auto-update"
        git push
